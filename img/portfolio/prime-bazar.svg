<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.07"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="710" cy="60" r="175" fill="white" opacity="0.05"/>
  <circle cx="75" cy="405" r="145" fill="white" opacity="0.05"/>
  <circle cx="660" cy="395" r="85" fill="white" opacity="0.04"/>
  <!-- Icon circle -->
  <circle cx="400" cy="175" r="90" fill="url(#iconGrad)" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Shopping bag handle -->
  <path d="M 375 153 Q 375 130 400 130 Q 425 130 425 153" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Shopping bag body -->
  <rect x="355" y="148" width="90" height="78" rx="10" fill="white" opacity="0.9"/>
  <!-- Bag details - fold at top -->
  <rect x="355" y="148" width="90" height="16" rx="8" fill="white" opacity="0.7"/>
  <!-- Shopping bag icon line -->
  <line x1="380" y1="178" x2="420" y2="178" stroke="#ea580c" stroke-width="3" stroke-linecap="round"/>
  <!-- Price tag -->
  <circle cx="400" cy="193" r="10" fill="#ea580c" opacity="0.8"/>
  <text x="400" y="197" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="700">$</text>
  <!-- Title -->
  <text x="400" y="308" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="1">Prime Bazar</text>
  <text x="400" y="340" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="16" fill="white" opacity="0.75">E-commerce App · Flutter</text>
  <!-- Tech tags -->
  <rect x="265" y="364" width="72" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="301" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">Flutter</text>
  <rect x="347" y="364" width="58" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="376" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">Dart</text>
  <rect x="415" y="364" width="122" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="476" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">State Management</text>
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.5">Prime IT · Feb 2022 – May 2022</text>
</svg>
