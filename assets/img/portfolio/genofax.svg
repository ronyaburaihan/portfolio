<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.07"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="700" cy="70" r="170" fill="white" opacity="0.05"/>
  <circle cx="80" cy="390" r="140" fill="white" opacity="0.05"/>
  <circle cx="150" cy="100" r="70" fill="white" opacity="0.04"/>
  <!-- Icon circle -->
  <circle cx="400" cy="175" r="90" fill="url(#iconGrad)" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Medical cross - vertical bar -->
  <rect x="382" y="128" width="36" height="94" rx="8" fill="white" opacity="0.92"/>
  <!-- Medical cross - horizontal bar -->
  <rect x="353" y="157" width="94" height="36" rx="8" fill="white" opacity="0.92"/>
  <!-- Heartbeat line below -->
  <polyline points="290,255 326,255 338,235 350,275 365,245 378,260 392,255 430,255 442,225 454,270 466,255 510,255" stroke="white" stroke-width="3.5" fill="none" opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title -->
  <text x="400" y="308" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="38" font-weight="700" fill="white" letter-spacing="1">Genofax</text>
  <text x="400" y="340" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="16" fill="white" opacity="0.75">Health &amp; Wellness · Android &amp; iOS</text>
  <!-- Tech tags -->
  <rect x="220" y="364" width="65" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="252" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">Kotlin</text>
  <rect x="295" y="364" width="72" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="331" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">MVVM</text>
  <rect x="377" y="364" width="90" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="422" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">Dagger Hilt</text>
  <rect x="477" y="364" width="72" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="513" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">Flutter</text>
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.5">Genofax® Life Sciences · Sep 2022 – Dec 2024</text>
