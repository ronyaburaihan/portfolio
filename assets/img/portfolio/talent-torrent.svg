<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.07"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="720" cy="60" r="175" fill="white" opacity="0.05"/>
  <circle cx="70" cy="405" r="145" fill="white" opacity="0.05"/>
  <circle cx="670" cy="395" r="85" fill="white" opacity="0.04"/>
  <!-- Icon circle -->
  <circle cx="400" cy="175" r="90" fill="url(#iconGrad)" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Laptop screen -->
  <rect x="355" y="130" width="90" height="62" rx="6" fill="white" opacity="0.92"/>
  <!-- Screen content lines -->
  <line x1="365" y1="142" x2="435" y2="142" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="365" y1="152" x2="420" y2="152" stroke="#4338ca" stroke-width="2" stroke-linecap="round"/>
  <line x1="365" y1="161" x2="425" y2="161" stroke="#4338ca" stroke-width="2" stroke-linecap="round"/>
  <line x1="365" y1="170" x2="400" y2="170" stroke="#4338ca" stroke-width="2" stroke-linecap="round"/>
  <!-- Laptop base -->
  <rect x="340" y="192" width="120" height="10" rx="5" fill="white" opacity="0.92"/>
  <!-- Laptop hinge notch -->
  <rect x="388" y="192" width="24" height="5" rx="2" fill="white" opacity="0.5"/>
  <!-- WiFi symbol above screen -->
  <path d="M 390 122 A 14 14 0 0 1 410 122" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 383 115 A 22 22 0 0 1 417 115" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <circle cx="400" cy="128" r="3" fill="white" opacity="0.8"/>
  <!-- People icons (remote work) -->
  <circle cx="340" cy="175" r="8" fill="white" opacity="0.6"/>
  <path d="M 327 200 Q 327 185 340 185 Q 353 185 353 200" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <circle cx="460" cy="175" r="8" fill="white" opacity="0.6"/>
  <path d="M 447 200 Q 447 185 460 185 Q 473 185 473 200" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Title -->
  <text x="400" y="308" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="1">Talent Torrent</text>
  <text x="400" y="340" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="16" fill="white" opacity="0.75">Remote Work Platform · Android</text>
  <!-- Tech tags -->
  <rect x="230" y="364" width="65" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="262" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">Kotlin</text>
  <rect x="305" y="364" width="72" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="341" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">MVVM</text>
  <rect x="387" y="364" width="88" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="431" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">Coroutines</text>
  <rect x="485" y="364" width="62" height="28" rx="14" fill="white" opacity="0.13"/>
  <text x="516" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.9">Stripe</text>
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.5">Aug 2022 – Dec 2024</text>
